<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<title>GPS Land Measure Pro</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/@turf/turf@6.5.0/turf.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
:root{--p:#00d4aa;--pd:#00a882;--a:#ff6b35;--a2:#ffd700;--bg:#0a0e1a;--card:rgba(14,20,38,0.97);--b:rgba(0,212,170,0.22);--bb:rgba(0,212,170,0.55);--t:#e8f4f0;--td:rgba(232,244,240,0.55);--tb:#fff;--d:#ff4757;--w:#ffa502;--sh:0 4px 24px rgba(0,0,0,0.65);--sg:0 0 20px rgba(0,212,170,0.22);--f:'Rajdhani',sans-serif;--m:'JetBrains Mono',monospace;--r:12px}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);font-family:var(--f);color:var(--t)}
#map{position:absolute;inset:0;z-index:0;cursor:crosshair!important}
.leaflet-container{cursor:crosshair!important}
.leaflet-control-attribution{font-size:9px!important;opacity:0.4;background:rgba(0,0,0,0.4)!important;color:#aaa!important}
.leaflet-control-zoom{display:none!important}
.mm{display:flex;align-items:center;justify-content:center;width:28px;height:28px;border-radius:50%;background:var(--p);border:2.5px solid #fff;color:#0a0e1a;font-family:var(--f);font-weight:700;font-size:12px;box-shadow:0 2px 12px rgba(0,212,170,0.5),0 0 0 4px rgba(0,212,170,0.12);cursor:pointer;transition:transform 0.15s}
.mm:hover{transform:scale(1.15)}
.mm.sel{background:var(--a);box-shadow:0 2px 12px rgba(255,107,53,0.6)}
.dist-lbl{background:rgba(10,14,26,0.9)!important;border:1px solid rgba(0,212,170,0.5)!important;color:var(--p)!important;font-family:var(--m)!important;font-size:10px!important;padding:2px 6px!important;border-radius:4px!important;white-space:nowrap!important;font-weight:500!important;pointer-events:none!important}
.ang-lbl{background:rgba(10,14,26,0.9)!important;border:1px solid rgba(255,215,0,0.35)!important;color:var(--a2)!important;font-family:var(--m)!important;font-size:10px!important;padding:2px 5px!important;border-radius:4px!important;white-space:nowrap!important;pointer-events:none!important}
.dist-lbl::before,.dist-lbl::after,.ang-lbl::before,.ang-lbl::after{display:none!important}
#topbar{position:absolute;top:0;left:0;right:0;z-index:1000;padding:10px 10px 0;display:flex;gap:8px;align-items:flex-start}
.ib{width:42px;height:42px;border-radius:var(--r);flex-shrink:0;background:var(--card);border:1px solid var(--b);color:var(--t);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:18px;box-shadow:var(--sh);transition:all 0.15s}
.ib:hover{border-color:var(--bb)}
#sw{flex:1;position:relative}
#sb{display:flex;align-items:center;background:var(--card);border:1px solid var(--b);border-radius:var(--r);overflow:hidden;box-shadow:var(--sh)}
#si-icon{padding:0 10px;color:var(--p);font-size:16px;flex-shrink:0;min-width:36px;display:flex;align-items:center;justify-content:center}
#si{flex:1;background:none;border:none;outline:none;color:var(--t);font-family:var(--f);font-size:15px;padding:10px 0;letter-spacing:0.02em}
#si::placeholder{color:var(--td)}
#sc{padding:0 10px;background:none;border:none;color:var(--td);cursor:pointer;font-size:18px}
#sr{position:absolute;top:calc(100% + 6px);left:0;right:0;background:var(--card);border:1px solid var(--bb);border-radius:var(--r);box-shadow:0 8px 40px rgba(0,0,0,0.85);overflow:hidden;z-index:3000;display:none;max-height:400px;overflow-y:auto}
.ri{padding:11px 14px;border-bottom:1px solid rgba(0,212,170,0.07);cursor:pointer;transition:background 0.1s}
.ri:hover{background:rgba(0,212,170,0.09)}
.ri:last-child{border-bottom:none}
.r-main{font-weight:600;font-size:14px;color:var(--tb);margin-bottom:2px}
.r-sec{color:var(--td);font-size:11px;line-height:1.4}
.r-src{display:inline-block;font-size:9px;padding:1px 5px;border-radius:3px;font-family:var(--m);font-weight:700;margin-top:3px}
.src-g{background:rgba(66,133,244,0.18);color:#4285f4;border:1px solid rgba(66,133,244,0.3)}
.src-c{background:rgba(255,215,0,0.15);color:var(--a2);border:1px solid rgba(255,215,0,0.3)}
.src-o{background:rgba(0,212,170,0.15);color:var(--p);border:1px solid rgba(0,212,170,0.3)}
.r-none{padding:14px;color:var(--td);font-size:13px;text-align:center}
.r-tip{padding:10px 14px;font-size:11px;color:rgba(255,107,53,0.85);background:rgba(255,107,53,0.06);line-height:1.7}
.r-hdr{padding:6px 14px;font-size:10px;font-weight:700;color:var(--td);letter-spacing:0.1em;text-transform:uppercase;background:rgba(0,212,170,0.04);border-bottom:1px solid var(--b)}
#lw{position:relative}
#ld{position:absolute;top:calc(100% + 6px);right:0;background:var(--card);border:1px solid var(--b);border-radius:var(--r);overflow:hidden;box-shadow:var(--sh);min-width:130px;display:none;z-index:2000}
.li{display:flex;align-items:center;gap:8px;padding:10px 14px;cursor:pointer;font-size:14px;font-family:var(--f)}
.li:hover{background:rgba(0,212,170,0.08)}
.li.active{color:var(--p);background:rgba(0,212,170,0.1);font-weight:700}
#tools{position:absolute;right:10px;top:50%;transform:translateY(-50%);display:flex;flex-direction:column;gap:6px;z-index:1000}
.tb2{width:46px;height:46px;border-radius:10px;background:var(--card);border:1px solid var(--b);color:var(--t);cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;box-shadow:var(--sh);transition:all 0.15s;font-family:var(--f);font-size:18px}
.tb2:disabled{opacity:0.3;cursor:not-allowed}
.tb2:not(:disabled):hover{border-color:var(--bb);transform:scale(1.04)}
.tb2 .tl{font-size:9px;letter-spacing:0.05em;opacity:0.65}
.tb2.dn{color:var(--d)}.tb2.wn{color:var(--w)}.tb2.pr{color:var(--p)}.tb2.gd{color:var(--a2)}
.tb2.ac{background:rgba(0,212,170,0.12);border-color:var(--p)}
.ts{height:1px;background:rgba(0,212,170,0.12);margin:4px 0}
#mp{position:absolute;bottom:80px;left:10px;z-index:1000;background:var(--card);border:1px solid var(--bb);border-radius:14px;padding:12px 16px;min-width:205px;box-shadow:var(--sh),var(--sg);display:none}
.mph{display:flex;align-items:center;gap:6px;margin-bottom:10px;border-bottom:1px solid var(--b);padding-bottom:8px}
.mpt{font-weight:700;font-size:13px;color:var(--p);letter-spacing:0.07em;text-transform:uppercase}
.mpb{margin-left:auto;background:var(--p);color:var(--bg);border-radius:6px;padding:1px 7px;font-size:11px;font-weight:700;font-family:var(--m)}
.mt{display:flex;justify-content:space-between;align-items:baseline;gap:10px;margin-bottom:6px}
.ml{font-size:10px;font-family:var(--f);letter-spacing:0.08em;color:var(--td);font-weight:600;flex-shrink:0;text-transform:uppercase}
.mv{font-family:var(--m);font-size:12px;font-weight:500;color:var(--t);text-align:right}
.mv.big{font-size:15px;font-weight:700;color:var(--p)}
.mv.sf{color:var(--a2);font-size:13px;font-weight:700}
.msp{height:1px;background:var(--b);margin:4px 0 6px}
#cd{position:absolute;bottom:0;left:0;right:0;z-index:1100;background:var(--card);border-top:1px solid var(--bb);border-radius:16px 16px 0 0;box-shadow:0 -4px 30px rgba(0,0,0,0.5);max-height:45vh;display:none;flex-direction:column}
#sd{position:absolute;bottom:0;left:0;right:0;z-index:1100;background:var(--card);border-top:1px solid rgba(255,215,0,0.3);border-radius:16px 16px 0 0;box-shadow:0 -4px 30px rgba(0,0,0,0.5);max-height:60vh;display:none;flex-direction:column}
.dh{display:flex;align-items:center;justify-content:space-between;padding:12px 16px 8px;flex-shrink:0;border-bottom:1px solid var(--b)}
.dt{font-weight:700;font-size:14px;letter-spacing:0.06em;text-transform:uppercase}
.dc{background:none;border:none;color:var(--td);cursor:pointer;font-size:22px;width:28px;height:28px;display:flex;align-items:center;justify-content:center}
.db{overflow-y:auto;flex:1}
.ch2{display:grid;grid-template-columns:28px 1fr 1fr;gap:8px;padding:6px 16px;border-bottom:1px solid rgba(0,212,170,0.07);flex-shrink:0}
.chh{font-size:10px;font-weight:700;color:var(--td);letter-spacing:0.08em;text-transform:uppercase;font-family:var(--f)}
.cr{display:grid;grid-template-columns:28px 1fr 1fr;gap:8px;padding:8px 16px;border-bottom:1px solid rgba(0,212,170,0.04);cursor:pointer;transition:background 0.1s}
.cr:hover{background:rgba(0,212,170,0.05)}
.cr.sel{background:rgba(0,212,170,0.1)}
.pb{width:22px;height:22px;border-radius:50%;background:var(--p);color:var(--bg);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;font-family:var(--f);flex-shrink:0}
.pb.sel{background:var(--a)}
.cv{font-family:var(--m);font-size:12px;color:var(--t);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.em{padding:24px 16px;color:var(--td);font-size:13px;text-align:center;line-height:1.6}
.si2{padding:12px 16px;border-bottom:1px solid rgba(0,212,170,0.05)}
.sn{font-weight:700;font-size:15px;color:var(--tb)}
.sm{font-family:var(--m);font-size:10px;color:var(--td);margin-top:2px}
.sa{font-family:var(--m);font-size:12px;color:var(--p);font-weight:600}
.sf2{font-family:var(--m);font-size:11px;color:var(--a2)}
.sbt{display:flex;gap:6px;margin-top:8px}
.sb2{flex:1;padding:6px 0;border-radius:7px;font-family:var(--f);font-weight:600;font-size:12px;cursor:pointer;transition:all 0.12s}
.sbl{background:rgba(0,212,170,0.12);border:1px solid rgba(0,212,170,0.3);color:var(--p)}
.sbe{background:rgba(255,215,0,0.1);border:1px solid rgba(255,215,0,0.3);color:var(--a2)}
.sbd{background:rgba(255,71,87,0.1);border:1px solid rgba(255,71,87,0.3);color:var(--d)}
#sm2{position:absolute;inset:0;z-index:2000;background:rgba(0,0,0,0.75);display:none;align-items:center;justify-content:center;padding:16px}
.mb{background:var(--card);border:1px solid var(--bb);border-radius:16px;padding:20px;width:100%;max-width:360px;box-shadow:var(--sh),var(--sg)}
.mh{display:flex;align-items:center;gap:8px;margin-bottom:14px}
.mhh{font-weight:700;font-size:18px;color:var(--p)}
.mst{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.msc{background:rgba(0,212,170,0.06);border:1px solid var(--b);border-radius:10px;padding:8px 12px}
.msl{font-family:var(--m);font-size:10px;color:var(--td);margin-bottom:2px}
.msv{font-family:var(--m);font-size:13px;font-weight:700;color:var(--p)}
.msv.go{color:var(--a2)}
.fl{font-size:12px;font-weight:600;color:var(--td);letter-spacing:0.07em;text-transform:uppercase;margin-bottom:6px;display:block}
.ni{width:100%;background:rgba(0,212,170,0.05);border:1px solid var(--bb);border-radius:10px;padding:10px 14px;color:var(--t);font-family:var(--f);font-size:15px;outline:none;margin-bottom:12px}
.ni:focus{border-color:var(--p)}
.pr2{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap}
.pb3{flex:1;min-width:58px;padding:7px 4px;border-radius:8px;background:rgba(0,212,170,0.06);border:1px solid var(--b);color:var(--td);font-family:var(--f);font-size:11px;font-weight:600;cursor:pointer;text-align:center;transition:all 0.12s}
.pb3.ac{background:rgba(0,212,170,0.18);border-color:var(--p);color:var(--p)}
.mbt{display:flex;gap:8px}
.bcn{flex:1;padding:10px;background:transparent;border:1px solid var(--b);border-radius:10px;color:var(--td);font-family:var(--f);font-weight:600;font-size:14px;cursor:pointer}
.bsv{flex:2;padding:10px;background:var(--p);border:none;border-radius:10px;color:var(--bg);font-family:var(--f);font-weight:700;font-size:14px;cursor:pointer}
#hint{position:absolute;bottom:80px;left:50%;transform:translateX(-50%);background:rgba(10,14,26,0.88);border:1px solid rgba(0,212,170,0.3);border-radius:10px;padding:10px 20px;color:rgba(232,244,240,0.7);font-family:var(--f);font-size:14px;pointer-events:none;z-index:900;white-space:nowrap}
#zb{position:absolute;right:10px;bottom:90px;z-index:1000;display:flex;flex-direction:column;gap:4px}
.zbt{width:36px;height:36px;border-radius:8px;background:var(--card);border:1px solid var(--b);color:var(--t);font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:var(--sh);line-height:1}
.zbt:hover{border-color:var(--bb)}
.sp{display:inline-block;width:14px;height:14px;border:2px solid rgba(0,212,170,0.3);border-top-color:var(--p);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:var(--bb);border-radius:2px}
</style>
</head>
<body>
<div id="map"></div>

<div id="topbar">
  <button class="ib" id="menu-btn">
    <svg width="18" height="14" viewBox="0 0 18 14"><rect y="0" width="18" height="2" rx="1" fill="currentColor"/><rect y="6" width="18" height="2" rx="1" fill="currentColor"/><rect y="12" width="18" height="2" rx="1" fill="currentColor"/></svg>
  </button>
  <div id="sw">
    <div id="sb">
      <span id="si-icon">🔍</span>
      <input id="si" type="text" placeholder="H.no 1772 Sector 4 Gurgaon..." autocomplete="off" autocorrect="off" spellcheck="false"/>
      <button id="sc" style="display:none">×</button>
    </div>
    <div id="sr"></div>
  </div>
  <div id="lw">
    <button class="ib" id="lb">🗺️</button>
    <div id="ld">
      <div class="li active" data-l="street">🗺️ Street</div>
      <div class="li" data-l="satellite">🛰️ Satellite</div>
      <div class="li" data-l="hybrid">🌍 Hybrid</div>
    </div>
  </div>
</div>

<div id="tools">
  <button class="tb2 wn" id="bu" disabled><span>↩</span><span class="tl">UNDO</span></button>
  <button class="tb2 dn" id="bd" disabled><span>🗑</span><span class="tl">DEL</span></button>
  <button class="tb2 dn" id="bc" disabled><span>✕</span><span class="tl">CLEAR</span></button>
  <div class="ts"></div>
  <button class="tb2 pr" id="bsave" disabled><span>💾</span><span class="tl">SAVE</span></button>
  <button class="tb2" id="bco"><span>📋</span><span class="tl">COORDS</span></button>
  <button class="tb2 gd" id="bsd"><span>📁</span><span class="tl">SAVED</span></button>
</div>

<div id="zb">
  <button class="zbt" id="bzi">+</button>
  <button class="zbt" id="bzo">−</button>
</div>

<div id="mp">
  <div class="mph"><span style="color:var(--p);font-size:14px">◈</span><span class="mpt">Live Measurement</span><span class="mpb" id="mp-pts">0 pts</span></div>
  <div class="mt"><span class="ml">SQ. FEET</span><span class="mv sf" id="mp-sf">—</span></div>
  <div class="mt"><span class="ml">AREA (m²)</span><span class="mv big" id="mp-a">—</span></div>
  <div class="mt"><span class="ml">ACRES</span><span class="mv" id="mp-ac">—</span></div>
  <div class="mt"><span class="ml">HECTARES</span><span class="mv" id="mp-ha">—</span></div>
  <div class="mt"><span class="ml">GUNTA</span><span class="mv" id="mp-gu">—</span></div>
  <div class="msp"></div>
  <div class="mt"><span class="ml">PERIMETER</span><span class="mv" id="mp-pe">—</span></div>
</div>

<div id="hint">📍 Tap the map to add boundary points</div>

<div id="cd">
  <div class="dh">
    <div style="display:flex;align-items:center;gap:8px"><span>📍</span><span class="dt" style="color:var(--p)">Coordinates</span><span class="mpb" id="cd-n" style="background:rgba(0,212,170,0.15);color:var(--p)">0</span></div>
    <button class="dc" id="cc">×</button>
  </div>
  <div class="ch2"><span class="chh">#</span><span class="chh">LATITUDE</span><span class="chh">LONGITUDE</span></div>
  <div class="db" id="cl"></div>
</div>

<div id="sd">
  <div class="dh">
    <div style="display:flex;align-items:center;gap:8px"><span>📁</span><span class="dt" style="color:var(--a2)">Saved</span><span id="sd-n" style="background:rgba(255,215,0,0.12);color:var(--a2);border-radius:6px;padding:1px 7px;font-size:11px;font-weight:700;font-family:var(--m)">0</span></div>
    <button class="dc" id="cs">×</button>
  </div>
  <div class="db" id="sl"></div>
</div>

<div id="sm2">
  <div class="mb">
    <div class="mh"><span style="font-size:20px">💾</span><span class="mhh">Save Measurement</span></div>
    <div class="mst">
      <div class="msc"><div class="msl">AREA</div><div class="msv" id="mo-a">—</div></div>
      <div class="msc"><div class="msl">SQ. FEET</div><div class="msv go" id="mo-sf">—</div></div>
      <div class="msc"><div class="msl">ACRES</div><div class="msv" id="mo-ac" style="color:var(--t)">—</div></div>
      <div class="msc"><div class="msl">PERIMETER</div><div class="msv" id="mo-pe" style="color:var(--t)">—</div></div>
    </div>
    <label class="fl">Property Name / Address</label>
    <input class="ni" id="mn" type="text" placeholder="e.g. H.No 1772, Sector 4, Gurgaon"/>
    <label class="fl">Property Type</label>
    <div class="pr2">
      <button class="pb3 ac" data-t="Plot">🏗 Plot</button>
      <button class="pb3" data-t="House">🏠 House</button>
      <button class="pb3" data-t="Factory">🏭 Factory</button>
      <button class="pb3" data-t="Land">🌾 Land</button>
      <button class="pb3" data-t="Field">🌿 Field</button>
      <button class="pb3" data-t="Other">📌 Other</button>
    </div>
    <div class="mbt">
      <button class="bcn" id="cnc">Cancel</button>
      <button class="bsv" id="csv">Save Measurement</button>
    </div>
  </div>
</div>

<script>
// ── CONFIG ─────────────────────────────────────────────────
const GK='AIzaSyBaRS2iSFFPCuyzbmQITu_WfL_uwLQ65WY';

// ── STATE ──────────────────────────────────────────────────
let pts=[],selId=null,layer='street',coOpen=false,svOpen=false,dt=null,pty='Plot';
let gReady=false,gcSvc=null,autoSvc=null;
let meas=[];try{meas=JSON.parse(localStorage.getItem('glmp4')||'[]')}catch(e){}
let map,bTile,lTile;
const mkMap=new Map();
let poly=null,pline=null;
const dls=[],als=[];

// ── MAP ────────────────────────────────────────────────────
function initMap(){
  map=L.map('map',{center:[28.4595,77.0266],zoom:15,zoomControl:false});
  bTile=L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'© OpenStreetMap',maxZoom:21}).addTo(map);
  map.on('click',e=>addPt(e.latlng.lat,e.latlng.lng));
}
const TL={street:{url:'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',attr:'© OSM'},satellite:{url:'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',attr:'© Esri'}};
function setLayer(l){
  layer=l;if(bTile)map.removeLayer(bTile);if(lTile){map.removeLayer(lTile);lTile=null;}
  const c=TL[l==='hybrid'?'satellite':l];
  bTile=L.tileLayer(c.url,{attribution:c.attr,maxZoom:21}).addTo(map);
  if(l==='hybrid'){lTile=L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{opacity:0.45,maxZoom:21}).addTo(map);}
  document.querySelectorAll('.li').forEach(e=>e.classList.toggle('active',e.dataset.l===l));
  document.getElementById('lb').textContent={street:'🗺️',satellite:'🛰️',hybrid:'🌍'}[l];
  document.getElementById('ld').style.display='none';
}
document.getElementById('lb').addEventListener('click',e=>{e.stopPropagation();const d=document.getElementById('ld');d.style.display=d.style.display==='block'?'none':'block';});
document.querySelectorAll('.li').forEach(e=>e.addEventListener('click',()=>setLayer(e.dataset.l)));
document.getElementById('bzi').addEventListener('click',()=>map.zoomIn());

// ── GOOGLE API LOADER ──────────────────────────────────────
function loadGoogle(){
  return new Promise(res=>{
    if(window.google&&window.google.maps){res();return;}
    window.__gmcb=()=>{res();};
    const s=document.createElement('script');
    s.src=`https://maps.googleapis.com/maps/api/js?key=${GK}&libraries=places&callback=__gmcb&loading=async`;
    s.async=true;s.defer=true;document.head.appendChild(s);
  });
}
loadGoogle().then(()=>{
  gReady=true;
  try{
    autoSvc=new google.maps.places.AutocompleteService();
    gcSvc=new google.maps.Geocoder();
  }catch(e){console.warn('Google Places init:',e);}
}).catch(e=>console.warn('Google load failed:',e));

// ── SMART SEARCH ENGINE ────────────────────────────────────
const inp=document.getElementById('si');
const res=document.getElementById('sr');
const clr=document.getElementById('sc');
const ico=document.getElementById('si-icon');

inp.addEventListener('input',()=>{
  const q=inp.value.trim();
  clr.style.display=q?'block':'none';
  if(dt)clearTimeout(dt);
  if(!q){res.style.display='none';return;}
  // Faster response - 250ms debounce
  dt=setTimeout(()=>search(q),250);
});
inp.addEventListener('keydown',e=>{
  if(e.key==='Enter'&&inp.value.trim())search(inp.value.trim());
  if(e.key==='Escape')res.style.display='none';
});
clr.addEventListener('click',()=>{inp.value='';res.style.display='none';clr.style.display='none';});

async function search(q){
  // 1. Check for coordinate input: "28.45, 77.03"
  const cm=q.match(/^(-?\d+\.?\d*)\s*,\s*(-?\d+\.?\d*)$/);
  if(cm){
    const la=parseFloat(cm[1]),ln=parseFloat(cm[2]);
    if(la>=-90&&la<=90&&ln>=-180&&ln<=180){
      renderRes([{la,ln,main:`📍 ${la.toFixed(6)}, ${ln.toFixed(6)}`,sec:'Go to coordinates',src:'c'}]);
      return;
    }
  }

  ico.innerHTML='<span class="sp"></span>';
  res.innerHTML='<div class="r-hdr">Searching...</div>';
  res.style.display='block';

  const results=[];
  const seen=new Set();

  // Strategy: run Google + OSM in parallel
  const [gRes,oRes]=await Promise.allSettled([
    googleSearch(q),
    osmSearch(q)
  ]);

  // Merge — Google first (more accurate for Indian addresses)
  if(gRes.status==='fulfilled'&&gRes.value){
    gRes.value.forEach(r=>{
      const k=`${r.la?.toFixed(3)},${r.ln?.toFixed(3)}`;
      if(r.placeId||!seen.has(k)){seen.add(k);results.push(r);}
    });
  }
  if(oRes.status==='fulfilled'&&oRes.value){
    oRes.value.forEach(r=>{
      const k=`${r.la?.toFixed(3)},${r.ln?.toFixed(3)}`;
      if(!seen.has(k)){seen.add(k);results.push(r);}
    });
  }

  ico.textContent='🔍';
  renderRes(results,q);
}

async function googleSearch(q){
  // Try Places Autocomplete first (best for typing partial addresses)
  if(gReady&&autoSvc){
    return new Promise(res2=>{
      autoSvc.getPlacePredictions({
        input:q,
        componentRestrictions:{country:'in'},
        types:[]
      },(preds,status)=>{
        if(status===google.maps.places.PlacesServiceStatus.OK&&preds&&preds.length){
          res2(preds.map(p=>({
            placeId:p.place_id,
            main:p.structured_formatting.main_text,
            sec:p.structured_formatting.secondary_text||'',
            src:'g'
          })));
        } else {
          // Fallback to Geocoding API
          googleGeocode(q).then(res2).catch(()=>res2([]));
        }
      });
    });
  } else {
    return googleGeocode(q);
  }
}

async function googleGeocode(q){
  // Try multiple query variants for better Indian address matching
  const queries=[
    q+', India',
    q.replace(/\bs\.?no\.?\s*/i,'Survey No ').replace(/\bkh\.?\s*/i,'Khasra '),
    q
  ];
  for(const qq of queries){
    try{
      const r=await fetch(`https://maps.googleapis.com/maps/api/geocode/json?address=${encodeURIComponent(qq)}&region=in&key=${GK}`);
      const d=await r.json();
      if(d.status==='REQUEST_DENIED')return [];
      if(d.results&&d.results.length){
        return d.results.slice(0,4).map(r=>({
          la:r.geometry.location.lat,
          ln:r.geometry.location.lng,
          main:r.formatted_address.split(',')[0],
          sec:r.formatted_address.split(',').slice(1,4).join(',').trim(),
          src:'g'
        }));
      }
    }catch(e){}
  }
  return [];
}

async function osmSearch(q){
  // Photon geocoder — good India coverage
  try{
    const url=`https://photon.komoot.io/api/?q=${encodeURIComponent(q+' India')}&limit=4&lang=en`;
    const r=await fetch(url);const d=await r.json();
    return (d.features||[]).map(f=>{
      const p=f.properties;
      const main=[p.housenumber,p.name,p.street].filter(Boolean).join(' ')||p.city||'Unknown';
      const sec=[p.district,p.city,p.state,p.country].filter(Boolean).join(', ');
      return{la:f.geometry.coordinates[1],ln:f.geometry.coordinates[0],main,sec,src:'o'};
    });
  }catch(e){return [];}
}

function renderRes(results,q){
  if(!results||!results.length){
    res.innerHTML=`
      <div class="r-none">No results for "<b>${escH(q||'')}</b>"</div>
      <div class="r-tip">
        💡 <b>For better results, try:</b><br>
        • Full address: "H.No 1772, Sector 4, Gurgaon, Haryana"<br>
        • Plot format: "Plot No 47, Sector 9, Gurugram"<br>
        • Factory: "Unit 12, Industrial Area Phase 2, Ludhiana"<br>
        • Farm/Land: "Khasra 456, Village Bajghera, Gurugram"<br>
        • Coordinates: "28.4595, 77.0266"<br>
        • Or switch to <b>🛰 Satellite</b> and tap corners manually
      </div>`;
    res.style.display='block';
    return;
  }
  res.innerHTML=results.map((r,i)=>`
    <div class="ri" data-i="${i}">
      <div class="r-main">${escH(r.main)}</div>
      ${r.sec?`<div class="r-sec">${escH(r.sec)}</div>`:''}
      <span class="r-src ${r.src==='c'?'src-c':r.src==='g'?'src-g':'src-o'}">${r.src==='c'?'COORDS':r.src==='g'?'GOOGLE':'OSM'}</span>
    </div>`).join('');
  res.style.display='block';

  res.querySelectorAll('.ri').forEach(el=>{
    el.addEventListener('click',()=>{
      const r=results[parseInt(el.dataset.i)];
      if(r.src==='c'||typeof r.la==='number'){
        // Direct coordinates available
        map.flyTo([r.la,r.ln],19,{duration:1.0});
        inp.value=r.main.replace('📍 ','');
        res.style.display='none';
      } else if(r.placeId){
        // Need to resolve place_id via Geocoding
        ico.innerHTML='<span class="sp"></span>';
        fetch(`https://maps.googleapis.com/maps/api/geocode/json?place_id=${r.placeId}&key=${GK}`)
          .then(x=>x.json()).then(d=>{
            ico.textContent='🔍';
            if(d.results&&d.results[0]){
              const loc=d.results[0].geometry.location;
              map.flyTo([loc.lat,loc.lng],19,{duration:1.0});
              inp.value=r.main;
              res.style.display='none';
            }
          }).catch(()=>{ico.textContent='🔍';});
      }
    });
  });
}

// ── POINTS & DRAWING ───────────────────────────────────────
function uid(){return Math.random().toString(36).slice(2,10);}
function addPt(la,ln){pts.push({id:uid(),lat:la,lng:ln,label:pts.length+1});selId=null;renderAll();}

document.getElementById('bu').addEventListener('click',()=>{
  if(!pts.length)return;const r=pts.pop();const m=mkMap.get(r.id);if(m){map.removeLayer(m);mkMap.delete(r.id);}selId=null;renderAll();
});
document.getElementById('bd').addEventListener('click',()=>{
  if(!selId)return;const m=mkMap.get(selId);if(m){map.removeLayer(m);mkMap.delete(selId);}
  pts=pts.filter(p=>p.id!==selId).map((p,i)=>({...p,label:i+1}));selId=null;renderAll();
});
document.getElementById('bc').addEventListener('click',()=>{
  pts=[];selId=null;mkMap.forEach(m=>map.removeLayer(m));mkMap.clear();renderAll();
});
function selPt(id){selId=selId===id?null:id;renderAll();}
function renderAll(){rMk();rPoly();rDist();rAng();updUI();}

function rMk(){
  const cur=new Set(pts.map(p=>p.id));
  [...mkMap.keys()].forEach(id=>{if(!cur.has(id)){map.removeLayer(mkMap.get(id));mkMap.delete(id);}});
  pts.forEach(p=>{
    const s=p.id===selId;
    const ic=L.divIcon({className:'',html:`<div class="mm${s?' sel':''}">${p.label}</div>`,iconSize:[28,28],iconAnchor:[14,14]});
    if(mkMap.has(p.id)){mkMap.get(p.id).setLatLng([p.lat,p.lng]).setIcon(ic);}
    else{const mk=L.marker([p.lat,p.lng],{icon:ic,zIndexOffset:1000}).addTo(map);mk.on('click',e=>{L.DomEvent.stopPropagation(e);selPt(p.id);});mkMap.set(p.id,mk);}
  });
}
function rPoly(){
  if(poly){map.removeLayer(poly);poly=null;}if(pline){map.removeLayer(pline);pline=null;}
  if(pts.length>=3){poly=L.polygon(pts.map(p=>[p.lat,p.lng]),{color:'#00d4aa',weight:2.5,opacity:.9,fillColor:'#00d4aa',fillOpacity:.1}).addTo(map);}
  else if(pts.length===2){pline=L.polyline(pts.map(p=>[p.lat,p.lng]),{color:'#00d4aa',weight:2.5,dashArray:'6 4'}).addTo(map);}
}

// ── GEOMETRY ───────────────────────────────────────────────
function hav(a,b,c,d){const R=6371000,r=Math.PI/180,dl=(c-a)*r,dn=(d-b)*r,x=Math.sin(dl/2)**2+Math.cos(a*r)*Math.cos(c*r)*Math.sin(dn/2)**2;return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x));}
function rDist(){
  dls.forEach(l=>map.removeLayer(l));dls.length=0;
  if(pts.length<2)return;const n=pts.length,c=n>=3?n:n-1;
  for(let i=0;i<c;i++){
    const a=pts[i],b=pts[(i+1)%n];if(i===n-1&&n<3)break;
    dls.push(L.marker([(a.lat+b.lat)/2,(a.lng+b.lng)/2],{icon:L.divIcon({className:'dist-lbl',html:fD(hav(a.lat,a.lng,b.lat,b.lng)),iconAnchor:[20,10]}),interactive:false,zIndexOffset:500}).addTo(map));
  }
}
function rAng(){
  als.forEach(l=>map.removeLayer(l));als.length=0;
  if(pts.length<3)return;const n=pts.length;
  for(let i=0;i<n;i++){
    const pv=pts[(i-1+n)%n],cu=pts[i],nx=pts[(i+1)%n];
    const v1={x:pv.lng-cu.lng,y:pv.lat-cu.lat},v2={x:nx.lng-cu.lng,y:nx.lat-cu.lat};
    const dot=v1.x*v2.x+v1.y*v2.y,mg=Math.sqrt((v1.x**2+v1.y**2)*(v2.x**2+v2.y**2));
    if(!mg)continue;
    const ag=Math.round(Math.acos(Math.max(-1,Math.min(1,dot/mg)))*1800)/10;
    als.push(L.marker([cu.lat,cu.lng],{icon:L.divIcon({className:'ang-lbl',html:`${ag}°`,iconAnchor:[-6,22]}),interactive:false,zIndexOffset:400}).addTo(map));
  }
}
function cArea(){
  if(pts.length<3)return{a:0,ac:0,ha:0,sf:0,gu:0};
  try{const c=[...pts.map(p=>[p.lng,p.lat]),[pts[0].lng,pts[0].lat]];const a=turf.area(turf.polygon([c]));return{a,ac:a/4046.856,ha:a/10000,sf:a*10.7639,gu:a/101.17};}
  catch(e){return{a:0,ac:0,ha:0,sf:0,gu:0};}
}
function cPerim(){
  if(pts.length<2)return 0;let t=0;const n=pts.length;
  for(let i=0;i<n;i++){const a=pts[i],b=pts[(i+1)%n];if(i===n-1&&n<3)break;t+=hav(a.lat,a.lng,b.lat,b.lng);}return t;
}
function fD(m){return m>=1000?`${(m/1e3).toFixed(2)}km`:m>=1?`${m.toFixed(1)}m`:`${(m*100).toFixed(0)}cm`;}
function fA(s){return s>=1e6?`${(s/1e6).toFixed(4)}km²`:s>=1e4?`${(s/1e4).toFixed(4)}ha`:`${s.toFixed(2)}m²`;}
function fSF(f){return f>0?`${Math.round(f).toLocaleString()} sq ft`:'—';}

// ── UI UPDATE ──────────────────────────────────────────────
function updUI(){
  const n=pts.length,hp=n>0,hs=!!selId;
  document.getElementById('bu').disabled=!hp;
  document.getElementById('bd').disabled=!hs;
  document.getElementById('bc').disabled=!hp;
  document.getElementById('bsave').disabled=!hp;
  document.getElementById('hint').style.display=hp?'none':'block';
  const panel=document.getElementById('mp');
  if(n>=2){
    panel.style.display='block';
    const{a,ac,ha,sf,gu}=cArea();const pe=cPerim();
    document.getElementById('mp-pts').textContent=`${n} pts`;
    document.getElementById('mp-sf').textContent=fSF(sf);
    document.getElementById('mp-a').textContent=fA(a);
    document.getElementById('mp-ac').textContent=`${ac.toFixed(4)} ac`;
    document.getElementById('mp-ha').textContent=`${ha.toFixed(4)} ha`;
    document.getElementById('mp-gu').textContent=`${gu.toFixed(3)} Gunta`;
    document.getElementById('mp-pe').textContent=fD(pe);
  }else panel.style.display='none';
  if(coOpen)rCL();
  if(!hp&&coOpen)closeCO();
}
function rCL(){
  document.getElementById('cd-n').textContent=pts.length;
  const l=document.getElementById('cl');
  if(!pts.length){l.innerHTML='<div class="em">No points yet</div>';return;}
  l.innerHTML=pts.map(p=>`<div class="cr${p.id===selId?' sel':''}" data-id="${p.id}"><div class="pb${p.id===selId?' sel':''}">${p.label}</div><span class="cv">${p.lat.toFixed(7)}</span><span class="cv">${p.lng.toFixed(7)}</span></div>`).join('');
  l.querySelectorAll('.cr').forEach(el=>el.addEventListener('click',()=>selPt(el.dataset.id)));
}

// ── DRAWERS ────────────────────────────────────────────────
function togCO(){coOpen=!coOpen;if(svOpen)closeSV();document.getElementById('cd').style.display=coOpen?'flex':'none';document.getElementById('bco').classList.toggle('ac',coOpen);if(coOpen)rCL();}
function closeCO(){coOpen=false;document.getElementById('cd').style.display='none';document.getElementById('bco').classList.remove('ac');}
function togSV(){svOpen=!svOpen;if(coOpen)closeCO();document.getElementById('sd').style.display=svOpen?'flex':'none';document.getElementById('bsd').classList.toggle('ac',svOpen);if(svOpen)rSL();}
function closeSV(){svOpen=false;document.getElementById('sd').style.display='none';document.getElementById('bsd').classList.remove('ac');}
document.getElementById('bco').addEventListener('click',togCO);
document.getElementById('bsd').addEventListener('click',togSV);
document.getElementById('cc').addEventListener('click',closeCO);
document.getElementById('cs').addEventListener('click',closeSV);

const TI=t=>({Plot:'🏗',House:'🏠',Factory:'🏭',Land:'🌾',Field:'🌿'}[t]||'📌');
function rSL(){
  const l=document.getElementById('sl');
  document.getElementById('sd-n').textContent=meas.length;
  if(!meas.length){l.innerHTML='<div class="em">No saved measurements yet.<br><span style="opacity:0.6;font-size:11px">Mark a boundary and tap 💾</span></div>';return;}
  l.innerHTML=[...meas].reverse().map(m=>`<div class="si2"><div style="display:flex;justify-content:space-between;align-items:flex-start"><div><div class="sn">${TI(m.pt)} ${escH(m.name)}</div><div class="sm">${new Date(m.ts).toLocaleDateString('en-IN')} · ${m.pts.length} pts · ${m.pt||'Plot'}</div></div><div style="text-align:right"><div class="sa">${fA(m.a)}</div><div class="sf2">${fSF(m.sf||m.a*10.7639)}</div></div></div><div class="sbt"><button class="sb2 sbl" data-id="${m.id}">Load</button><button class="sb2 sbe" data-id="${m.id}">Export</button><button class="sb2 sbd" data-id="${m.id}">Delete</button></div></div>`).join('');
  l.querySelectorAll('.sbl').forEach(b=>b.addEventListener('click',()=>loadM(b.dataset.id)));
  l.querySelectorAll('.sbe').forEach(b=>b.addEventListener('click',()=>expM(b.dataset.id)));
  l.querySelectorAll('.sbd').forEach(b=>b.addEventListener('click',()=>{meas=meas.filter(m=>m.id!==b.dataset.id);try{localStorage.setItem('glmp4',JSON.stringify(meas));}catch(e){}rSL();}));
}

// ── SAVE ───────────────────────────────────────────────────
document.getElementById('bsave').addEventListener('click',()=>{
  if(!pts.length)return;
  const{a,sf,ac}=cArea();const pe=cPerim();
  document.getElementById('mo-a').textContent=fA(a);
  document.getElementById('mo-sf').textContent=fSF(sf);
  document.getElementById('mo-ac').textContent=`${ac.toFixed(4)} ac`;
  document.getElementById('mo-pe').textContent=fD(pe);
  document.getElementById('mn').value='';
  document.getElementById('sm2').style.display='flex';
  setTimeout(()=>document.getElementById('mn').focus(),100);
});
document.getElementById('cnc').addEventListener('click',()=>document.getElementById('sm2').style.display='none');
document.getElementById('sm2').addEventListener('click',e=>{if(e.target===document.getElementById('sm2'))document.getElementById('sm2').style.display='none';});
document.getElementById('mn').addEventListener('keydown',e=>{if(e.key==='Enter')doSave();});
document.getElementById('csv').addEventListener('click',doSave);
document.querySelectorAll('.pb3').forEach(b=>{b.addEventListener('click',()=>{document.querySelectorAll('.pb3').forEach(x=>x.classList.remove('ac'));b.classList.add('ac');pty=b.dataset.t;});});

function doSave(){
  const nm=document.getElementById('mn').value.trim();if(!nm)return;
  const{a,ac,ha,sf,gu}=cArea();const pe=cPerim();
  const m={id:uid(),name:nm,pt:pty,pts:JSON.parse(JSON.stringify(pts)),a,ac,ha,sf,gu,perimeter:pe,ts:Date.now()};
  meas.push(m);try{localStorage.setItem('glmp4',JSON.stringify(meas));}catch(e){}
  document.getElementById('sm2').style.display='none';
  if(svOpen)rSL();
}

function loadM(id){
  const m=meas.find(x=>x.id===id);if(!m)return;
  mkMap.forEach(mk=>map.removeLayer(mk));mkMap.clear();
  if(poly){map.removeLayer(poly);poly=null;}if(pline){map.removeLayer(pline);pline=null;}
  dls.forEach(l=>map.removeLayer(l));dls.length=0;als.forEach(l=>map.removeLayer(l));als.length=0;
  pts=JSON.parse(JSON.stringify(m.pts));selId=null;renderAll();
  if(pts.length){const mLa=pts.reduce((s,p)=>s+p.lat,0)/pts.length,mLn=pts.reduce((s,p)=>s+p.lng,0)/pts.length;map.flyTo([mLa,mLn],18,{duration:1.2});}
  closeSV();
}

function expM(id){
  const m=meas.find(x=>x.id===id);if(!m)return;
  const sf=m.sf||m.a*10.7639;
  const lines=['=================================================','      GPS LAND MEASURE PRO — FIELD REPORT v3','=================================================','',`Property   : ${m.name}`,`Type       : ${m.pt||'Plot'}`,`Date       : ${new Date(m.ts).toLocaleString('en-IN')}`,`Reference  : ${m.id}`,'','-------------------------------------------------','  MEASUREMENTS','-------------------------------------------------',`Area       : ${m.a.toFixed(4)} m²`,`Sq. Feet   : ${sf.toFixed(2)} sq ft`,`Acres      : ${m.ac.toFixed(6)} acres`,`Hectares   : ${m.ha.toFixed(6)} ha`,`Gunta      : ${(m.gu||m.a/101.17).toFixed(4)} Gunta`,`Perimeter  : ${m.perimeter.toFixed(2)} m  (${(m.perimeter/1000).toFixed(4)} km)`,`Points     : ${m.pts.length}`,'','-------------------------------------------------','  BOUNDARY COORDINATES (WGS84/GPS)','-------------------------------------------------',...m.pts.map((p,i)=>`  [${i+1}]  Lat: ${p.lat.toFixed(8)}   Lng: ${p.lng.toFixed(8)}`),'','-------------------------------------------------','  ⚠ For legal/official purposes verify with','  a licensed land surveyor.','  GPS Land Measure Pro v3','================================================='];
  const blob=new Blob([lines.join('\n')],{type:'text/plain'});
  const url=URL.createObjectURL(blob);const a=document.createElement('a');
  a.href=url;a.download=`${m.pt}_${m.name.replace(/[^a-z0-9]/gi,'_').slice(0,30)}.txt`;a.click();URL.revokeObjectURL(url);
}

// ── UTILS ──────────────────────────────────────────────────
function escH(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
document.addEventListener('click',()=>{res.style.display='none';document.getElementById('ld').style.display='none';});
document.getElementById('sw').addEventListener('click',e=>e.stopPropagation());
document.getElementById('lw').addEventListener('click',e=>e.stopPropagation());

initMap();updUI();
</script>
