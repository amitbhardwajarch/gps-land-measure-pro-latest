<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<title>GPS Land Measure Pro</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/@turf/turf@6.5.0/turf.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
:root{--primary:#00d4aa;--primary-dark:#00a882;--accent:#ff6b35;--accent2:#ffd700;--bg-dark:#0a0e1a;--bg-card:rgba(14,20,38,0.97);--border:rgba(0,212,170,0.22);--border-bright:rgba(0,212,170,0.55);--text:#e8f4f0;--text-dim:rgba(232,244,240,0.55);--text-bright:#fff;--danger:#ff4757;--warning:#ffa502;--shadow:0 4px 24px rgba(0,0,0,0.65);--shadow-glow:0 0 20px rgba(0,212,170,0.22);--font:'Rajdhani',sans-serif;--mono:'JetBrains Mono',monospace;--r:12px}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg-dark);font-family:var(--font);color:var(--text)}
#map{position:absolute;inset:0;z-index:0;cursor:crosshair!important}
.leaflet-container{cursor:crosshair!important}
.leaflet-control-attribution{font-size:9px!important;opacity:0.4;background:rgba(0,0,0,0.4)!important;color:#aaa!important}
.leaflet-control-zoom{display:none!important}
.mm{display:flex;align-items:center;justify-content:center;width:28px;height:28px;border-radius:50%;background:var(--primary);border:2.5px solid #fff;color:#0a0e1a;font-family:var(--font);font-weight:700;font-size:12px;box-shadow:0 2px 12px rgba(0,212,170,0.5),0 0 0 4px rgba(0,212,170,0.12);cursor:pointer;transition:transform 0.15s}
.mm:hover{transform:scale(1.15)}
.mm.sel{background:var(--accent);box-shadow:0 2px 12px rgba(255,107,53,0.6)}
.dist-lbl{background:rgba(10,14,26,0.88)!important;border:1px solid rgba(0,212,170,0.5)!important;color:var(--primary)!important;font-family:var(--mono)!important;font-size:10px!important;padding:2px 6px!important;border-radius:4px!important;white-space:nowrap!important;font-weight:500!important;box-shadow:0 2px 8px rgba(0,0,0,0.5)!important;pointer-events:none!important}
.ang-lbl{background:rgba(10,14,26,0.88)!important;border:1px solid rgba(255,215,0,0.35)!important;color:var(--accent2)!important;font-family:var(--mono)!important;font-size:10px!important;padding:2px 5px!important;border-radius:4px!important;white-space:nowrap!important;pointer-events:none!important}
.dist-lbl::before,.dist-lbl::after,.ang-lbl::before,.ang-lbl::after{display:none!important}
#topbar{position:absolute;top:0;left:0;right:0;z-index:1000;padding:10px 10px 0;display:flex;gap:8px;align-items:flex-start}
.icon-btn{width:42px;height:42px;border-radius:var(--r);flex-shrink:0;background:var(--bg-card);border:1px solid var(--border);color:var(--text);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:18px;box-shadow:var(--shadow);transition:all 0.15s ease}
.icon-btn:hover{border-color:var(--border-bright)}
#search-wrap{flex:1;position:relative}
#search-box{display:flex;align-items:center;background:var(--bg-card);border:1px solid var(--border);border-radius:var(--r);overflow:visible;box-shadow:var(--shadow);position:relative}
#search-icon{padding:0 10px;color:var(--primary);font-size:16px;flex-shrink:0}
#search-input{flex:1;background:none;border:none;outline:none;color:var(--text);font-family:var(--font);font-size:15px;padding:10px 0;letter-spacing:0.02em}
#search-input::placeholder{color:var(--text-dim)}
#search-clear{padding:0 10px;background:none;border:none;color:var(--text-dim);cursor:pointer;font-size:18px;flex-shrink:0}
#search-results{position:absolute;top:calc(100% + 6px);left:0;right:0;background:var(--bg-card);border:1px solid var(--border-bright);border-radius:var(--r);box-shadow:0 8px 32px rgba(0,0,0,0.8);overflow:hidden;z-index:3000;display:none;max-height:380px;overflow-y:auto}
.sr-item{padding:11px 14px;border-bottom:1px solid rgba(0,212,170,0.07);cursor:pointer;transition:background 0.1s}
.sr-item:hover{background:rgba(0,212,170,0.09)}
.sr-item:last-child{border-bottom:none}
.sr-main{font-weight:600;font-size:14px;color:var(--text-bright);margin-bottom:2px}
.sr-sec{color:var(--text-dim);font-size:11px;line-height:1.4}
.sr-badge{display:inline-block;font-size:9px;padding:1px 5px;border-radius:3px;font-family:var(--mono);font-weight:700;letter-spacing:0.06em;margin-top:3px}
.badge-g{background:rgba(66,133,244,0.2);color:#4285f4;border:1px solid rgba(66,133,244,0.35)}
.badge-coords{background:rgba(255,215,0,0.15);color:var(--accent2);border:1px solid rgba(255,215,0,0.3)}
.sr-noresult{padding:14px;color:var(--text-dim);font-size:13px;text-align:center}
.sr-tip{padding:10px 14px;font-size:11px;color:rgba(255,107,53,0.8);background:rgba(255,107,53,0.06);border-top:1px solid rgba(255,107,53,0.15);line-height:1.6}
#layer-wrap{position:relative}
#layer-dropdown{position:absolute;top:calc(100% + 6px);right:0;background:var(--bg-card);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;box-shadow:var(--shadow);min-width:130px;display:none;z-index:2000}
.layer-item{display:flex;align-items:center;gap:8px;padding:10px 14px;cursor:pointer;font-size:14px;font-family:var(--font)}
.layer-item:hover{background:rgba(0,212,170,0.08)}
.layer-item.active{color:var(--primary);background:rgba(0,212,170,0.1);font-weight:700}
#tools{position:absolute;right:10px;top:50%;transform:translateY(-50%);display:flex;flex-direction:column;gap:6px;z-index:1000}
.tool-btn{width:46px;height:46px;border-radius:10px;background:var(--bg-card);border:1px solid var(--border);color:var(--text);cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;box-shadow:var(--shadow);transition:all 0.15s ease;font-family:var(--font);font-size:18px}
.tool-btn:disabled{opacity:0.3;cursor:not-allowed}
.tool-btn:not(:disabled):hover{border-color:var(--border-bright);transform:scale(1.04)}
.tool-btn .tlbl{font-size:9px;letter-spacing:0.05em;opacity:0.65}
.tool-btn.danger{color:var(--danger)}
.tool-btn.warn{color:var(--warning)}
.tool-btn.primary{color:var(--primary)}
.tool-btn.gold{color:var(--accent2)}
.tool-btn.active{background:rgba(0,212,170,0.12);border-color:var(--primary)}
.tool-sep{height:1px;background:rgba(0,212,170,0.12);margin:4px 0}
#measure-panel{position:absolute;bottom:80px;left:10px;z-index:1000;background:var(--bg-card);border:1px solid var(--border-bright);border-radius:14px;padding:12px 16px;min-width:200px;box-shadow:var(--shadow),var(--shadow-glow);display:none}
.mp-header{display:flex;align-items:center;gap:6px;margin-bottom:10px;border-bottom:1px solid var(--border);padding-bottom:8px}
.mp-title{font-weight:700;font-size:13px;color:var(--primary);letter-spacing:0.07em;text-transform:uppercase}
.mp-badge{margin-left:auto;background:var(--primary);color:var(--bg-dark);border-radius:6px;padding:1px 7px;font-size:11px;font-weight:700;font-family:var(--mono)}
.metric{display:flex;justify-content:space-between;align-items:baseline;gap:10px;margin-bottom:6px}
.m-lbl{font-size:10px;font-family:var(--font);letter-spacing:0.08em;color:var(--text-dim);font-weight:600;flex-shrink:0;text-transform:uppercase}
.m-val{font-family:var(--mono);font-size:12px;font-weight:500;color:var(--text);text-align:right}
.m-val.big{font-size:15px;font-weight:700;color:var(--primary)}
.m-val.sqft{color:var(--accent2);font-size:13px;font-weight:700}
.mp-sep{height:1px;background:var(--border);margin:4px 0 6px}
#coord-drawer{position:absolute;bottom:0;left:0;right:0;z-index:1100;background:var(--bg-card);border-top:1px solid var(--border-bright);border-radius:16px 16px 0 0;box-shadow:0 -4px 30px rgba(0,0,0,0.5);max-height:45vh;display:none;flex-direction:column}
#saved-drawer{position:absolute;bottom:0;left:0;right:0;z-index:1100;background:var(--bg-card);border-top:1px solid rgba(255,215,0,0.3);border-radius:16px 16px 0 0;box-shadow:0 -4px 30px rgba(0,0,0,0.5);max-height:60vh;display:none;flex-direction:column}
.drawer-header{display:flex;align-items:center;justify-content:space-between;padding:12px 16px 8px;flex-shrink:0;border-bottom:1px solid var(--border)}
.drawer-title{font-weight:700;font-size:14px;letter-spacing:0.06em;text-transform:uppercase}
.drawer-close{background:none;border:none;color:var(--text-dim);cursor:pointer;font-size:22px;width:28px;height:28px;display:flex;align-items:center;justify-content:center}
.drawer-body{overflow-y:auto;flex:1}
.coord-head{display:grid;grid-template-columns:28px 1fr 1fr;gap:8px;padding:6px 16px;border-bottom:1px solid rgba(0,212,170,0.07);flex-shrink:0}
.ch{font-size:10px;font-weight:700;color:var(--text-dim);letter-spacing:0.08em;text-transform:uppercase;font-family:var(--font)}
.coord-row{display:grid;grid-template-columns:28px 1fr 1fr;gap:8px;padding:8px 16px;border-bottom:1px solid rgba(0,212,170,0.04);cursor:pointer;transition:background 0.1s}
.coord-row:hover{background:rgba(0,212,170,0.05)}
.coord-row.sel{background:rgba(0,212,170,0.1)}
.pt-badge{width:22px;height:22px;border-radius:50%;background:var(--primary);color:var(--bg-dark);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;font-family:var(--font);flex-shrink:0}
.pt-badge.sel{background:var(--accent)}
.coord-val{font-family:var(--mono);font-size:12px;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.empty-msg{padding:24px 16px;color:var(--text-dim);font-size:13px;text-align:center;line-height:1.6}
.saved-item{padding:12px 16px;border-bottom:1px solid rgba(0,212,170,0.05)}
.si-name{font-weight:700;font-size:15px;color:var(--text-bright)}
.si-meta{font-family:var(--mono);font-size:10px;color:var(--text-dim);margin-top:2px}
.si-area{font-family:var(--mono);font-size:12px;color:var(--primary);font-weight:600}
.si-sqft{font-family:var(--mono);font-size:11px;color:var(--accent2)}
.si-btns{display:flex;gap:6px;margin-top:8px}
.si-btn{flex:1;padding:6px 0;border-radius:7px;font-family:var(--font);font-weight:600;font-size:12px;letter-spacing:0.04em;cursor:pointer;transition:all 0.12s}
.si-btn-load{background:rgba(0,212,170,0.12);border:1px solid rgba(0,212,170,0.3);color:var(--primary)}
.si-btn-exp{background:rgba(255,215,0,0.1);border:1px solid rgba(255,215,0,0.3);color:var(--accent2)}
.si-btn-del{background:rgba(255,71,87,0.1);border:1px solid rgba(255,71,87,0.3);color:var(--danger)}
#save-modal{position:absolute;inset:0;z-index:2000;background:rgba(0,0,0,0.75);display:none;align-items:center;justify-content:center;padding:16px}
.modal-box{background:var(--bg-card);border:1px solid var(--border-bright);border-radius:16px;padding:20px;width:100%;max-width:360px;box-shadow:var(--shadow),var(--shadow-glow)}
.modal-title{display:flex;align-items:center;gap:8px;margin-bottom:14px}
.modal-h{font-weight:700;font-size:18px;color:var(--primary);letter-spacing:0.04em}
.modal-stats{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.mstat{background:rgba(0,212,170,0.06);border:1px solid var(--border);border-radius:10px;padding:8px 12px}
.mstat-lbl{font-family:var(--mono);font-size:10px;color:var(--text-dim);margin-bottom:2px}
.mstat-val{font-family:var(--mono);font-size:13px;font-weight:700;color:var(--primary)}
.mstat-val.gold{color:var(--accent2)}
.form-lbl{font-size:12px;font-weight:600;color:var(--text-dim);letter-spacing:0.07em;text-transform:uppercase;margin-bottom:6px;display:block}
.name-input{width:100%;background:rgba(0,212,170,0.05);border:1px solid var(--border-bright);border-radius:10px;padding:10px 14px;color:var(--text);font-family:var(--font);font-size:15px;outline:none;margin-bottom:12px}
.name-input:focus{border-color:var(--primary)}
.ptype-row{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap}
.ptype-btn{flex:1;min-width:58px;padding:7px 4px;border-radius:8px;background:rgba(0,212,170,0.06);border:1px solid var(--border);color:var(--text-dim);font-family:var(--font);font-size:11px;font-weight:600;cursor:pointer;text-align:center;transition:all 0.12s}
.ptype-btn.active{background:rgba(0,212,170,0.18);border-color:var(--primary);color:var(--primary)}
.modal-btns{display:flex;gap:8px}
.btn-cancel{flex:1;padding:10px;background:transparent;border:1px solid var(--border);border-radius:10px;color:var(--text-dim);font-family:var(--font);font-weight:600;font-size:14px;cursor:pointer}
.btn-save{flex:2;padding:10px;background:var(--primary);border:none;border-radius:10px;color:var(--bg-dark);font-family:var(--font);font-weight:700;font-size:14px;cursor:pointer;letter-spacing:0.04em}
#hint{position:absolute;bottom:80px;left:50%;transform:translateX(-50%);background:rgba(10,14,26,0.88);border:1px solid rgba(0,212,170,0.3);border-radius:10px;padding:10px 20px;color:rgba(232,244,240,0.7);font-family:var(--font);font-size:14px;pointer-events:none;z-index:900;white-space:nowrap}
#zoom-btns{position:absolute;right:10px;bottom:90px;z-index:1000;display:flex;flex-direction:column;gap:4px}
.zoom-btn{width:36px;height:36px;border-radius:8px;background:var(--bg-card);border:1px solid var(--border);color:var(--text);font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:var(--shadow);line-height:1}
.zoom-btn:hover{border-color:var(--border-bright)}
.spinner{display:inline-block;width:14px;height:14px;border:2px solid rgba(0,212,170,0.3);border-top-color:var(--primary);border-radius:50%;animation:spin 0.7s linear infinite}
@keyframes fadeIn{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideUp{from{transform:translateY(100%);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes spin{to{transform:rotate(360deg)}}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:var(--border-bright);border-radius:2px}
</style>
</head>
<body>
<div id="map"></div>

<div id="topbar">
  <button class="icon-btn" id="menu-btn" title="Menu">
    <svg width="18" height="14" viewBox="0 0 18 14"><rect y="0" width="18" height="2" rx="1" fill="currentColor"/><rect y="6" width="18" height="2" rx="1" fill="currentColor"/><rect y="12" width="18" height="2" rx="1" fill="currentColor"/></svg>
  </button>
  <div id="search-wrap">
    <div id="search-box">
      <span id="search-icon">🔍</span>
      <input id="search-input" type="text" placeholder="Plot no, house, factory, land address..." autocomplete="off" />
      <button id="search-clear" style="display:none">×</button>
    </div>
    <div id="search-results"></div>
  </div>
  <div id="layer-wrap">
    <button class="icon-btn" id="layer-btn" title="Map type">🗺️</button>
    <div id="layer-dropdown">
      <div class="layer-item active" data-layer="street">🗺️ Street</div>
      <div class="layer-item" data-layer="satellite">🛰️ Satellite</div>
      <div class="layer-item" data-layer="hybrid">🌍 Hybrid</div>
    </div>
  </div>
</div>

<div id="tools">
  <button class="tool-btn warn" id="btn-undo" disabled><span>↩</span><span class="tlbl">UNDO</span></button>
  <button class="tool-btn danger" id="btn-delete" disabled><span>🗑</span><span class="tlbl">DEL</span></button>
  <button class="tool-btn danger" id="btn-clear" disabled><span>✕</span><span class="tlbl">CLEAR</span></button>
  <div class="tool-sep"></div>
  <button class="tool-btn primary" id="btn-save" disabled><span>💾</span><span class="tlbl">SAVE</span></button>
  <button class="tool-btn" id="btn-coords"><span>📋</span><span class="tlbl">COORDS</span></button>
  <button class="tool-btn gold" id="btn-saved"><span>📁</span><span class="tlbl">SAVED</span></button>
</div>

<div id="zoom-btns">
  <button class="zoom-btn" id="btn-zi">+</button>
  <button class="zoom-btn" id="btn-zo">−</button>
</div>

<div id="measure-panel">
  <div class="mp-header">
    <span style="color:var(--primary);font-size:14px">◈</span>
    <span class="mp-title">Live Measurement</span>
    <span class="mp-badge" id="mp-pts">0 pts</span>
  </div>
  <div class="metric"><span class="m-lbl">SQ. FEET</span><span class="m-val sqft" id="mp-sqft">—</span></div>
  <div class="metric"><span class="m-lbl">AREA (m²)</span><span class="m-val big" id="mp-area">—</span></div>
  <div class="metric"><span class="m-lbl">ACRES</span><span class="m-val" id="mp-acres">—</span></div>
  <div class="metric"><span class="m-lbl">HECTARES</span><span class="m-val" id="mp-ha">—</span></div>
  <div class="metric"><span class="m-lbl">GUNTA</span><span class="m-val" id="mp-gunta">—</span></div>
  <div class="mp-sep"></div>
  <div class="metric"><span class="m-lbl">PERIMETER</span><span class="m-val" id="mp-perim">—</span></div>
</div>

<div id="hint">📍 Tap the map to add boundary points</div>

<div id="coord-drawer">
  <div class="drawer-header">
    <div style="display:flex;align-items:center;gap:8px">
      <span>📍</span>
      <span class="drawer-title" style="color:var(--primary)">Coordinates</span>
      <span class="mp-badge" id="cd-count" style="background:rgba(0,212,170,0.15);color:var(--primary)">0</span>
    </div>
    <button class="drawer-close" id="close-coords">×</button>
  </div>
  <div class="coord-head"><span class="ch">#</span><span class="ch">LATITUDE</span><span class="ch">LONGITUDE</span></div>
  <div class="drawer-body" id="coord-list"></div>
</div>

<div id="saved-drawer">
  <div class="drawer-header">
    <div style="display:flex;align-items:center;gap:8px">
      <span>📁</span>
      <span class="drawer-title" style="color:var(--accent2)">Saved Measurements</span>
      <span id="saved-count" style="background:rgba(255,215,0,0.12);color:var(--accent2);border-radius:6px;padding:1px 7px;font-size:11px;font-weight:700;font-family:var(--mono)">0</span>
    </div>
    <button class="drawer-close" id="close-saved">×</button>
  </div>
  <div class="drawer-body" id="saved-list"></div>
</div>

<div id="save-modal">
  <div class="modal-box">
    <div class="modal-title"><span style="font-size:20px">💾</span><span class="modal-h">Save Measurement</span></div>
    <div class="modal-stats">
      <div class="mstat"><div class="mstat-lbl">AREA</div><div class="mstat-val" id="modal-area">—</div></div>
      <div class="mstat"><div class="mstat-lbl">SQ. FEET</div><div class="mstat-val gold" id="modal-sqft">—</div></div>
      <div class="mstat"><div class="mstat-lbl">ACRES</div><div class="mstat-val" id="modal-acres" style="color:var(--text)">—</div></div>
      <div class="mstat"><div class="mstat-lbl">PERIMETER</div><div class="mstat-val" id="modal-perim" style="color:var(--text)">—</div></div>
    </div>
    <label class="form-lbl">Property Name / Address</label>
    <input class="name-input" id="mname-input" type="text" placeholder="e.g. Plot 47, Sector 9, Gurgaon" />
    <label class="form-lbl">Property Type</label>
    <div class="ptype-row" id="ptype-row">
      <button class="ptype-btn active" data-type="Plot">🏗 Plot</button>
      <button class="ptype-btn" data-type="House">🏠 House</button>
      <button class="ptype-btn" data-type="Factory">🏭 Factory</button>
      <button class="ptype-btn" data-type="Land">🌾 Land</button>
      <button class="ptype-btn" data-type="Field">🌿 Field</button>
      <button class="ptype-btn" data-type="Other">📌 Other</button>
    </div>
    <div class="modal-btns">
      <button class="btn-cancel" id="cancel-save">Cancel</button>
      <button class="btn-save" id="confirm-save">Save Measurement</button>
    </div>
  </div>
</div>

<script>
// ── CONFIG ─────────────────────────────────────────────────
const GKEY = 'AIzaSyBaRS2iSFFPCuyzbmQITu_WfL_uwLQ65WY';

// ── STATE ──────────────────────────────────────────────────
let points=[],selectedId=null,currentLayer='street',coordOpen=false,savedOpen=false;
let debounceTimer=null,selectedPtype='Plot',acSvc=null,acActive=false;
let measurements=[];
try{measurements=JSON.parse(localStorage.getItem('gps_lmp_v3')||'[]')}catch(e){}

let map,baseTile,labelTile;
const markers=new Map();
let polygon=null,polyline=null;
const distLabels=[],angleLabels=[];

// ── MAP ────────────────────────────────────────────────────
function initMap(){
  map=L.map('map',{center:[28.4595,77.0266],zoom:15,zoomControl:false});
  baseTile=L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'© OpenStreetMap',maxZoom:21}).addTo(map);
  map.on('click',e=>addPoint(e.latlng.lat,e.latlng.lng));
}

// ── LAYERS ─────────────────────────────────────────────────
const TILES={
  street:{url:'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',attr:'© OpenStreetMap'},
  satellite:{url:'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',attr:'© Esri'},
};
function setLayer(l){
  currentLayer=l;
  if(baseTile)map.removeLayer(baseTile);
  if(labelTile){map.removeLayer(labelTile);labelTile=null;}
  const c=TILES[l==='hybrid'?'satellite':l];
  baseTile=L.tileLayer(c.url,{attribution:c.attr,maxZoom:21}).addTo(map);
  if(l==='hybrid'){labelTile=L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{opacity:0.45,maxZoom:21}).addTo(map);}
  document.querySelectorAll('.layer-item').forEach(el=>el.classList.toggle('active',el.dataset.layer===l));
  document.getElementById('layer-btn').textContent={street:'🗺️',satellite:'🛰️',hybrid:'🌍'}[l];
  document.getElementById('layer-dropdown').style.display='none';
}
document.getElementById('layer-btn').addEventListener('click',e=>{e.stopPropagation();const d=document.getElementById('layer-dropdown');d.style.display=d.style.display==='block'?'none':'block';});
document.querySelectorAll('.layer-item').forEach(el=>el.addEventListener('click',()=>setLayer(el.dataset.layer)));
document.getElementById('btn-zi').addEventListener('click',()=>map.zoomIn());
document.getElementById('btn-zo').addEventListener('click',()=>map.zoomOut());

// ── GOOGLE PLACES AUTOCOMPLETE SEARCH ─────────────────────
const searchInput=document.getElementById('search-input');
const searchResults=document.getElementById('search-results');
const searchClear=document.getElementById('search-clear');
const searchIcon=document.getElementById('search-icon');

// Load Google Maps JS API (Places library)
function loadGoogleAPI(){
  return new Promise((resolve)=>{
    if(window.google&&window.google.maps){resolve();return;}
    window.__gmCB=resolve;
    const s=document.createElement('script');
    s.src=`https://maps.googleapis.com/maps/api/js?key=${GKEY}&libraries=places&callback=__gmCB`;
    s.async=true;s.defer=true;
    document.head.appendChild(s);
  });
}

async function initPlaces(){
  await loadGoogleAPI();
  // Create a hidden div for Places service
  const dummy=document.createElement('div');
  document.body.appendChild(dummy);
  acSvc=new google.maps.places.AutocompleteService();
  acActive=true;
}
initPlaces().catch(e=>console.warn('Google Places init failed:',e));

searchInput.addEventListener('input',()=>{
  const q=searchInput.value.trim();
  searchClear.style.display=q?'block':'none';
  if(debounceTimer)clearTimeout(debounceTimer);
  if(!q){searchResults.style.display='none';return;}
  debounceTimer=setTimeout(()=>doSearch(q),300);
});
searchInput.addEventListener('keydown',e=>{
  if(e.key==='Enter'&&searchInput.value.trim())doSearch(searchInput.value.trim());
  if(e.key==='Escape'){searchResults.style.display='none';}
});
searchClear.addEventListener('click',()=>{searchInput.value='';searchResults.style.display='none';searchClear.style.display='none';});

async function doSearch(q){
  // Check if it's coordinates: "28.4523, 77.0312" or "28.4523,77.0312"
  const coordMatch=q.match(/^(-?\d+\.?\d*)\s*,\s*(-?\d+\.?\d*)$/);
  if(coordMatch){
    const lat=parseFloat(coordMatch[1]),lng=parseFloat(coordMatch[2]);
    if(lat>=-90&&lat<=90&&lng>=-180&&lng<=180){
      showResults([{lat,lng,main:'📍 Go to Coordinates',secondary:`${lat.toFixed(6)}, ${lng.toFixed(6)}`,type:'coords'}]);
      return;
    }
  }

  searchIcon.innerHTML='<span class="spinner"></span>';

  if(acActive&&acSvc){
    // Use Google Places Autocomplete — finds plots, houses, factories by exact address
    acSvc.getPlacePredictions({
      input:q,
      componentRestrictions:{country:'in'},
      types:[] // all types — residential, industrial, commercial, etc.
    },(predictions,status)=>{
      searchIcon.textContent='🔍';
      if(status===google.maps.places.PlacesServiceStatus.OK&&predictions&&predictions.length){
        const results=predictions.map(p=>({
          placeId:p.place_id,
          main:p.structured_formatting.main_text,
          secondary:p.structured_formatting.secondary_text||'',
          type:'google'
        }));
        showResults(results);
      } else {
        showNoResults(q);
      }
    });
  } else {
    // Fallback to Geocoding API
    try{
      const r=await fetch(`https://maps.googleapis.com/maps/api/geocode/json?address=${encodeURIComponent(q+', India')}&key=${GKEY}`);
      const d=await r.json();
      searchIcon.textContent='🔍';
      if(d.results&&d.results.length){
        const results=d.results.map(r=>({
          lat:r.geometry.location.lat,
          lng:r.geometry.location.lng,
          main:r.formatted_address.split(',')[0],
          secondary:r.formatted_address.split(',').slice(1).join(',').trim(),
          type:'google'
        }));
        showResults(results);
      } else showNoResults(q);
    }catch(e){searchIcon.textContent='🔍';showNoResults(q);}
  }
}

function showResults(results){
  searchResults.innerHTML=results.map((r,i)=>`
    <div class="sr-item" data-idx="${i}">
      <div class="sr-main">${escH(r.main)}</div>
      <div class="sr-sec">${escH(r.secondary||'')}</div>
      <span class="sr-badge ${r.type==='coords'?'badge-coords':'badge-g'}">${r.type==='coords'?'COORDS':'GOOGLE'}</span>
    </div>`).join('');
  searchResults.style.display='block';

  searchResults.querySelectorAll('.sr-item').forEach(el=>{
    el.addEventListener('click',()=>{
      const r=results[parseInt(el.dataset.idx)];
      if(r.type==='coords'){
        map.flyTo([r.lat,r.lng],18,{duration:1.0});
        searchInput.value=`${r.lat.toFixed(6)}, ${r.lng.toFixed(6)}`;
        searchResults.style.display='none';
        return;
      }
      if(r.placeId){
        // Resolve place_id to coordinates via Geocoding API
        searchIcon.innerHTML='<span class="spinner"></span>';
        fetch(`https://maps.googleapis.com/maps/api/geocode/json?place_id=${r.placeId}&key=${GKEY}`)
          .then(res=>res.json())
          .then(d=>{
            searchIcon.textContent='🔍';
            if(d.results&&d.results[0]){
              const loc=d.results[0].geometry.location;
              map.flyTo([loc.lat,loc.lng],19,{duration:1.0});
              searchInput.value=r.main;
              searchResults.style.display='none';
            }
          }).catch(()=>{searchIcon.textContent='🔍';});
      } else {
        map.flyTo([r.lat,r.lng],19,{duration:1.0});
        searchInput.value=r.main;
        searchResults.style.display='none';
      }
    });
  });
}

function showNoResults(q){
  searchResults.innerHTML=`
    <div class="sr-noresult">No results for "<b>${escH(q)}</b>"</div>
    <div class="sr-tip">
      💡 Try adding more detail:<br>
      • "Plot 47, Sector 9, Gurgaon, Haryana"<br>
      • "H.No 1772, Sector 4, Gurgaon"<br>
      • "DLF Factory, Phase 2, Faridabad"<br>
      • Paste coordinates: "28.4523, 77.0312"
    </div>`;
  searchResults.style.display='block';
}

// ── POINTS ─────────────────────────────────────────────────
function uid(){return Math.random().toString(36).slice(2,10);}
function addPoint(lat,lng){points.push({id:uid(),lat,lng,label:points.length+1});selectedId=null;renderAll();}

document.getElementById('btn-undo').addEventListener('click',()=>{
  if(!points.length)return;
  const r=points.pop();const m=markers.get(r.id);
  if(m){map.removeLayer(m);markers.delete(r.id);}
  selectedId=null;renderAll();
});
document.getElementById('btn-delete').addEventListener('click',()=>{
  if(!selectedId)return;
  const m=markers.get(selectedId);if(m){map.removeLayer(m);markers.delete(selectedId);}
  points=points.filter(p=>p.id!==selectedId).map((p,i)=>({...p,label:i+1}));
  selectedId=null;renderAll();
});
document.getElementById('btn-clear').addEventListener('click',()=>{
  points=[];selectedId=null;markers.forEach(m=>map.removeLayer(m));markers.clear();renderAll();
});
function selectPoint(id){selectedId=selectedId===id?null:id;renderAll();}
function renderAll(){renderMarkers();renderPolygon();renderDistLabels();renderAngleLabels();updateUI();}

function renderMarkers(){
  const cur=new Set(points.map(p=>p.id));
  [...markers.keys()].forEach(id=>{if(!cur.has(id)){map.removeLayer(markers.get(id));markers.delete(id);}});
  points.forEach(p=>{
    const isSel=p.id===selectedId;
    const icon=L.divIcon({className:'',html:`<div class="mm${isSel?' sel':''}">${p.label}</div>`,iconSize:[28,28],iconAnchor:[14,14]});
    if(markers.has(p.id)){markers.get(p.id).setLatLng([p.lat,p.lng]).setIcon(icon);}
    else{const mk=L.marker([p.lat,p.lng],{icon,zIndexOffset:1000}).addTo(map);mk.on('click',e=>{L.DomEvent.stopPropagation(e);selectPoint(p.id);});markers.set(p.id,mk);}
  });
}
function renderPolygon(){
  if(polygon){map.removeLayer(polygon);polygon=null;}
  if(polyline){map.removeLayer(polyline);polyline=null;}
  if(points.length>=3){polygon=L.polygon(points.map(p=>[p.lat,p.lng]),{color:'#00d4aa',weight:2.5,opacity:0.9,fillColor:'#00d4aa',fillOpacity:0.1}).addTo(map);}
  else if(points.length===2){polyline=L.polyline(points.map(p=>[p.lat,p.lng]),{color:'#00d4aa',weight:2.5,dashArray:'6 4'}).addTo(map);}
}

// ── GEOMETRY ───────────────────────────────────────────────
function haversine(a,b,c,d){const R=6371000,r=Math.PI/180,dl=(c-a)*r,dn=(d-b)*r,x=Math.sin(dl/2)**2+Math.cos(a*r)*Math.cos(c*r)*Math.sin(dn/2)**2;return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x));}
function renderDistLabels(){
  distLabels.forEach(l=>map.removeLayer(l));distLabels.length=0;
  if(points.length<2)return;
  const n=points.length,c=n>=3?n:n-1;
  for(let i=0;i<c;i++){
    const a=points[i],b=points[(i+1)%n];if(i===n-1&&n<3)break;
    distLabels.push(L.marker([(a.lat+b.lat)/2,(a.lng+b.lng)/2],{icon:L.divIcon({className:'dist-lbl',html:fmtD(haversine(a.lat,a.lng,b.lat,b.lng)),iconAnchor:[20,10]}),interactive:false,zIndexOffset:500}).addTo(map));
  }
}
function renderAngleLabels(){
  angleLabels.forEach(l=>map.removeLayer(l));angleLabels.length=0;
  if(points.length<3)return;
  const n=points.length;
  for(let i=0;i<n;i++){
    const pv=points[(i-1+n)%n],cu=points[i],nx=points[(i+1)%n];
    const v1={x:pv.lng-cu.lng,y:pv.lat-cu.lat},v2={x:nx.lng-cu.lng,y:nx.lat-cu.lat};
    const dot=v1.x*v2.x+v1.y*v2.y,mag=Math.sqrt((v1.x**2+v1.y**2)*(v2.x**2+v2.y**2));
    if(!mag)continue;
    const ang=Math.round(Math.acos(Math.max(-1,Math.min(1,dot/mag)))*1800)/10;
    angleLabels.push(L.marker([cu.lat,cu.lng],{icon:L.divIcon({className:'ang-lbl',html:`${ang}°`,iconAnchor:[-6,22]}),interactive:false,zIndexOffset:400}).addTo(map));
  }
}
function calcArea(){
  if(points.length<3)return{area:0,acres:0,ha:0,sqft:0,gunta:0};
  try{const c=[...points.map(p=>[p.lng,p.lat]),[points[0].lng,points[0].lat]];const a=turf.area(turf.polygon([c]));return{area:a,acres:a/4046.856,ha:a/10000,sqft:a*10.7639,gunta:a/101.17};}
  catch(e){return{area:0,acres:0,ha:0,sqft:0,gunta:0};}
}
function calcPerim(){
  if(points.length<2)return 0;let t=0;const n=points.length;
  for(let i=0;i<n;i++){const a=points[i],b=points[(i+1)%n];if(i===n-1&&n<3)break;t+=haversine(a.lat,a.lng,b.lat,b.lng);}return t;
}
function fmtD(m){return m>=1000?`${(m/1000).toFixed(2)}km`:m>=1?`${m.toFixed(1)}m`:`${(m*100).toFixed(0)}cm`;}
function fmtA(s){return s>=1e6?`${(s/1e6).toFixed(4)}km²`:s>=1e4?`${(s/1e4).toFixed(4)}ha`:`${s.toFixed(2)}m²`;}
function fmtSF(f){return f>0?`${Math.round(f).toLocaleString()} sq ft`:'—';}

// ── UI ─────────────────────────────────────────────────────
function updateUI(){
  const n=points.length,hp=n>0,hs=!!selectedId;
  document.getElementById('btn-undo').disabled=!hp;
  document.getElementById('btn-delete').disabled=!hs;
  document.getElementById('btn-clear').disabled=!hp;
  document.getElementById('btn-save').disabled=!hp;
  document.getElementById('hint').style.display=hp?'none':'block';
  const panel=document.getElementById('measure-panel');
  if(n>=2){
    panel.style.display='block';
    const{area,acres,ha,sqft,gunta}=calcArea();const perim=calcPerim();
    document.getElementById('mp-pts').textContent=`${n} pts`;
    document.getElementById('mp-sqft').textContent=fmtSF(sqft);
    document.getElementById('mp-area').textContent=fmtA(area);
    document.getElementById('mp-acres').textContent=`${acres.toFixed(4)} ac`;
    document.getElementById('mp-ha').textContent=`${ha.toFixed(4)} ha`;
    document.getElementById('mp-gunta').textContent=`${gunta.toFixed(3)} Gunta`;
    document.getElementById('mp-perim').textContent=fmtD(perim);
  }else panel.style.display='none';
  if(coordOpen)renderCoordList();
  if(!hp&&coordOpen)closeCoords();
}
function renderCoordList(){
  document.getElementById('cd-count').textContent=points.length;
  const list=document.getElementById('coord-list');
  if(!points.length){list.innerHTML='<div class="empty-msg">No points yet</div>';return;}
  list.innerHTML=points.map(p=>`<div class="coord-row${p.id===selectedId?' sel':''}" data-id="${p.id}"><div class="pt-badge${p.id===selectedId?' sel':''}">${p.label}</div><span class="coord-val">${p.lat.toFixed(7)}</span><span class="coord-val">${p.lng.toFixed(7)}</span></div>`).join('');
  list.querySelectorAll('.coord-row').forEach(el=>el.addEventListener('click',()=>selectPoint(el.dataset.id)));
}

// ── DRAWERS ────────────────────────────────────────────────
function toggleCoords(){coordOpen=!coordOpen;if(savedOpen)closeSaved();document.getElementById('coord-drawer').style.display=coordOpen?'flex':'none';document.getElementById('btn-coords').classList.toggle('active',coordOpen);if(coordOpen)renderCoordList();}
function closeCoords(){coordOpen=false;document.getElementById('coord-drawer').style.display='none';document.getElementById('btn-coords').classList.remove('active');}
function toggleSaved(){savedOpen=!savedOpen;if(coordOpen)closeCoords();document.getElementById('saved-drawer').style.display=savedOpen?'flex':'none';document.getElementById('btn-saved').classList.toggle('active',savedOpen);if(savedOpen)renderSavedList();}
function closeSaved(){savedOpen=false;document.getElementById('saved-drawer').style.display='none';document.getElementById('btn-saved').classList.remove('active');}
document.getElementById('btn-coords').addEventListener('click',toggleCoords);
document.getElementById('btn-saved').addEventListener('click',toggleSaved);
document.getElementById('close-coords').addEventListener('click',closeCoords);
document.getElementById('close-saved').addEventListener('click',closeSaved);

function renderSavedList(){
  const list=document.getElementById('saved-list');
  document.getElementById('saved-count').textContent=measurements.length;
  if(!measurements.length){list.innerHTML='<div class="empty-msg">No saved measurements yet.<br><span style="font-size:11px;opacity:0.6">Mark a boundary and tap 💾 Save.</span></div>';return;}
  const ti=(t)=>({Plot:'🏗',House:'🏠',Factory:'🏭',Land:'🌾',Field:'🌿'}[t]||'📌');
  list.innerHTML=[...measurements].reverse().map(m=>`<div class="saved-item"><div style="display:flex;justify-content:space-between;align-items:flex-start"><div><div class="si-name">${ti(m.ptype)} ${escH(m.name)}</div><div class="si-meta">${new Date(m.timestamp).toLocaleDateString('en-IN')} · ${m.points.length} pts · ${m.ptype||'Plot'}</div></div><div style="text-align:right"><div class="si-area">${fmtA(m.area)}</div><div class="si-sqft">${fmtSF(m.sqft||m.area*10.7639)}</div></div></div><div class="si-btns"><button class="si-btn si-btn-load" data-id="${m.id}">Load</button><button class="si-btn si-btn-exp" data-id="${m.id}">Export</button><button class="si-btn si-btn-del" data-id="${m.id}">Delete</button></div></div>`).join('');
  list.querySelectorAll('.si-btn-load').forEach(b=>b.addEventListener('click',()=>loadM(b.dataset.id)));
  list.querySelectorAll('.si-btn-exp').forEach(b=>b.addEventListener('click',()=>exportM(b.dataset.id)));
  list.querySelectorAll('.si-btn-del').forEach(b=>b.addEventListener('click',()=>{measurements=measurements.filter(m=>m.id!==b.dataset.id);try{localStorage.setItem('gps_lmp_v3',JSON.stringify(measurements));}catch(e){}renderSavedList();}));
}

// ── SAVE ───────────────────────────────────────────────────
document.getElementById('btn-save').addEventListener('click',()=>{
  if(!points.length)return;
  const{area,sqft,acres}=calcArea();const perim=calcPerim();
  document.getElementById('modal-area').textContent=fmtA(area);
  document.getElementById('modal-sqft').textContent=fmtSF(sqft);
  document.getElementById('modal-acres').textContent=`${acres.toFixed(4)} ac`;
  document.getElementById('modal-perim').textContent=fmtD(perim);
  document.getElementById('mname-input').value='';
  document.getElementById('save-modal').style.display='flex';
  setTimeout(()=>document.getElementById('mname-input').focus(),100);
});
document.getElementById('cancel-save').addEventListener('click',()=>document.getElementById('save-modal').style.display='none');
document.getElementById('save-modal').addEventListener('click',e=>{if(e.target===document.getElementById('save-modal'))document.getElementById('save-modal').style.display='none';});
document.getElementById('mname-input').addEventListener('keydown',e=>{if(e.key==='Enter')doSave();});
document.getElementById('confirm-save').addEventListener('click',doSave);
document.querySelectorAll('.ptype-btn').forEach(btn=>{btn.addEventListener('click',()=>{document.querySelectorAll('.ptype-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');selectedPtype=btn.dataset.type;});});

function doSave(){
  const name=document.getElementById('mname-input').value.trim();if(!name)return;
  const{area,acres,ha,sqft,gunta}=calcArea();const perim=calcPerim();
  const m={id:uid(),name,ptype:selectedPtype,points:JSON.parse(JSON.stringify(points)),area,acres,ha,sqft,gunta,perimeter:perim,timestamp:Date.now()};
  measurements.push(m);try{localStorage.setItem('gps_lmp_v3',JSON.stringify(measurements));}catch(e){}
  document.getElementById('save-modal').style.display='none';
  if(savedOpen)renderSavedList();
}

function loadM(id){
  const m=measurements.find(x=>x.id===id);if(!m)return;
  markers.forEach(mk=>map.removeLayer(mk));markers.clear();
  if(polygon){map.removeLayer(polygon);polygon=null;}if(polyline){map.removeLayer(polyline);polyline=null;}
  distLabels.forEach(l=>map.removeLayer(l));distLabels.length=0;
  angleLabels.forEach(l=>map.removeLayer(l));angleLabels.length=0;
  points=JSON.parse(JSON.stringify(m.points));selectedId=null;renderAll();
  if(points.length){const mLat=points.reduce((a,p)=>a+p.lat,0)/points.length,mLng=points.reduce((a,p)=>a+p.lng,0)/points.length;map.flyTo([mLat,mLng],18,{duration:1.2});}
  closeSaved();
}

function exportM(id){
  const m=measurements.find(x=>x.id===id);if(!m)return;
  const sqft=m.sqft||m.area*10.7639;
  const lines=['=================================================','      GPS LAND MEASURE PRO — FIELD REPORT','=================================================','',`Property   : ${m.name}`,`Type       : ${m.ptype||'Plot'}`,`Date       : ${new Date(m.timestamp).toLocaleString('en-IN')}`,`Reference  : ${m.id}`,'','-------------------------------------------------','  MEASUREMENTS','-------------------------------------------------',`Area       : ${m.area.toFixed(4)} m²`,`Sq. Feet   : ${sqft.toFixed(2)} sq ft`,`Acres      : ${m.acres.toFixed(6)} acres`,`Hectares   : ${m.ha.toFixed(6)} ha`,`Gunta      : ${(m.gunta||m.area/101.17).toFixed(4)} Gunta`,`Perimeter  : ${m.perimeter.toFixed(2)} m  (${(m.perimeter/1000).toFixed(4)} km)`,`Points     : ${m.points.length}`,'','-------------------------------------------------','  BOUNDARY COORDINATES (WGS84 / GPS)','-------------------------------------------------',...m.points.map((p,i)=>`  [${i+1}]  Lat: ${p.lat.toFixed(8)}   Lng: ${p.lng.toFixed(8)}`),'','-------------------------------------------------','  ⚠  For legal/official purposes, verify with','  a licensed land surveyor.','  Generated by GPS Land Measure Pro v3','================================================='];
  const blob=new Blob([lines.join('\n')],{type:'text/plain'});
  const url=URL.createObjectURL(blob);const a=document.createElement('a');
  a.href=url;a.download=`${m.ptype}_${m.name.replace(/[^a-z0-9]/gi,'_').slice(0,30)}_${m.id}.txt`;
  a.click();URL.revokeObjectURL(url);
}

// ── UTILS ──────────────────────────────────────────────────
function escH(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
document.addEventListener('click',()=>{searchResults.style.display='none';document.getElementById('layer-dropdown').style.display='none';});
document.getElementById('search-wrap').addEventListener('click',e=>e.stopPropagation());
document.getElementById('layer-wrap').addEventListener('click',e=>e.stopPropagation());

initMap();updateUI();
</script>
